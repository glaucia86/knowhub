name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pre-release-validation:
    name: Pre-release Validation
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate semantic tag format
        run: node scripts/ci/validate-release-tag.mjs "${GITHUB_REF}"

      - name: Lint
        run: npm run lint

      - name: Build (core)
        run: npm run build

      - name: Test
        run: npm run test

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: pre-release-validation
    timeout-minutes: 10

    steps:
      - name: Create GitHub release with automatic notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Placeholder for future CLI package publishing.
      # - name: Publish @knowhub/cli package
      #   run: npm publish -w @knowhub/cli
