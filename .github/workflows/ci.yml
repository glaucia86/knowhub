name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (core)
        run: npm run build

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm run test

      - name: Upload coverage artifacts (if available)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-reports
          path: |
            **/coverage/lcov.info
            **/coverage/coverage-final.json
          if-no-files-found: ignore

      - name: Detect coverage files
        if: always()
        id: coverage-check
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(**/coverage/lcov.info)
          if [ ${#files[@]} -gt 0 ]; then
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
            echo "Found coverage files:"
            printf '%s\n' "${files[@]}"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
            echo "No coverage files found. Skipping Codecov upload."
          fi

      - name: Upload coverage to Codecov
        if: ${{ always() && env.CODECOV_TOKEN != '' && steps.coverage-check.outputs.has_coverage == 'true' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: '**/coverage/lcov.info'
          fail_ci_if_error: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          verbose: false

  merge-gate:
    name: Merge Gate
    if: ${{ always() }}
    needs: [lint, build, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Enforce required checks
        run: |
          echo "Lint status: ${{ needs.lint.result }}"
          echo "Build status: ${{ needs.build.result }}"
          echo "Test status: ${{ needs.test.result }}"

          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint did not succeed (status: ${{ needs.lint.result }})."
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build did not succeed (status: ${{ needs.build.result }})."
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test and Coverage did not succeed (status: ${{ needs.test.result }})."
            exit 1
          fi
          echo "All required checks passed."
