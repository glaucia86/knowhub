name: Community Welcome

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: First contribution welcome
    runs-on: ubuntu-latest
    steps:
      - name: Welcome first-time contributors
        uses: actions/first-interaction@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          issue_message: >
            Thank you for opening your first issue on KnowHub! The maintenance team will review and respond shortly.
          pr_message: >
            Thank you for your first contribution to KnowHub! The CI will automatically validate
            and the maintainers will be notified for review.
